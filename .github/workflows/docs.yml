name: Deploy Versioned Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Manual docs version label (e.g. v0.1.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group docs

      - name: Build docs (PR only)
        if: github.event_name == 'pull_request'
        run: uv run mkdocs build --strict

      - name: Configure git for mike
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs as dev (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          uv run mike deploy --push --update-aliases dev latest
          uv run mike set-default --push latest

      - name: Deploy docs for tag release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          uv run mike deploy --push --update-aliases "$VERSION" latest
          uv run mike set-default --push latest

      - name: Deploy docs for manual version
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          uv run mike deploy --push --update-aliases "$VERSION" latest
          uv run mike set-default --push latest
